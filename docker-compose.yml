services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chess_mentor
      POSTGRES_PASSWORD: chess_mentor
      POSTGRES_DB: chess_mentor_development
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U chess_mentor -d chess_mentor_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USERNAME: chess_mentor
      DATABASE_PASSWORD: chess_mentor
      DATABASE_NAME: chess_mentor_development
      RAILS_ENV: development
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  worker:
    build:
      context: ./analysis
    env_file:
      - .env.worker
    environment:
      DATABASE_HOST: db
      REDIS_URL: redis://redis:6379/0
      STOCKFISH_PATH: /usr/games/stockfish
      # Clear env_file default so each container uses its own hostname (see config.py).
      WORKER_ID: ""
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
